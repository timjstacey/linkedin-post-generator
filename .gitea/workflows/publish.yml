name: Publish Post to LinkedIn

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect new post file
        id: detect-post
        run: |
          POST_FILE=$(git diff-tree --no-commit-id -r -m --first-parent \
            --diff-filter=A --name-only "$GITHUB_SHA" \
            | grep -E "^posts/.+\.md$" | head -1 || true)
          echo "post_file=$POST_FILE" >> "$GITHUB_OUTPUT"
          if [ -z "$POST_FILE" ]; then
            echo "No new post file found in this commit. Skipping."
          else
            echo "Found post file: $POST_FILE"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect-post.outputs.post_file != ''
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
        if: steps.detect-post.outputs.post_file != ''

      - run: npm run publish
        if: steps.detect-post.outputs.post_file != ''
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          POST_FILE_PATH: ${{ steps.detect-post.outputs.post_file }}
