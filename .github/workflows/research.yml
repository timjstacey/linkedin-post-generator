name: Research & Generate Post

on:
  schedule:
    - cron: '0 22 * * 0' # Sun 22:00 UTC = Mon 08:00 AEST
    - cron: '0 22 * * 2' # Tue 22:00 UTC = Wed 08:00 AEST
    - cron: '0 22 * * 4' # Thu 22:00 UTC = Fri 08:00 AEST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research-and-post:
    if: github.actor == 'timjstacey' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Write Tavily MCP config
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          cat > /tmp/mcp-config.json << EOF
          {
            "mcpServers": {
              "tavily": {
                "command": "npx",
                "args": ["-y", "tavily-mcp"],
                "env": {
                  "TAVILY_API_KEY": "${TAVILY_API_KEY}"
                }
              }
            }
          }
          EOF

      - uses: anthropics/claude-code-action@v1
        env:
          RESEARCH_TOPIC: ${{ secrets.RESEARCH_TOPIC }}
          HASHTAGS: ${{ secrets.HASHTAGS }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 40
            --model claude-sonnet-4-6
            --mcp-config /tmp/mcp-config.json
            --allowedTools "Bash,Read,Write,Edit,mcp__tavily__*"
          prompt: |
            Read and execute the instructions in `.claude/skills/research/research.md` exactly.
            RESEARCH_TOPIC, HASHTAGS, and GITHUB_REPO are available as environment variables.
