name: Research & Generate Post

on:
  schedule:
    - cron: '0 22 * * 0' # Sun 22:00 UTC = Mon 08:00 AEST
    - cron: '0 22 * * 2' # Tue 22:00 UTC = Wed 08:00 AEST
    - cron: '0 22 * * 4' # Thu 22:00 UTC = Fri 08:00 AEST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research-and-post:
    if: github.actor == 'timjstacey' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set today's date
        run: echo "TODAY=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Write Tavily MCP config
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          cat > /tmp/mcp-config.json << EOF
          {
            "mcpServers": {
              "tavily": {
                "command": "npx",
                "args": ["-y", "tavily-mcp"],
                "env": {
                  "TAVILY_API_KEY": "${TAVILY_API_KEY}"
                }
              }
            }
          }
          EOF

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 40
            --model claude-sonnet-4-6
            --mcp-config /tmp/mcp-config.json
            --allowedTools "Bash,Read,Write,Edit,mcp__tavily__*"
          prompt: |
            Today is ${{ env.TODAY }}. Research a topic and generate a LinkedIn post.

            **Topic:** ${{ secrets.RESEARCH_TOPIC }}
            **Hashtags to include:** ${{ secrets.HASHTAGS }}

            ## Steps

            1. Read all files in `posts/*.md` and `research/*.md` to understand what angles are already covered. Avoid duplicating those topics or angles.

            2. Use the Tavily search tool to find 5-8 recent articles (last 4 weeks) on the topic. Run multiple searches with different queries to find a fresh, specific angle not already covered.

            3. Read the writing rules in `.claude/skills/stop-slop/stop-slop.md`, `.claude/skills/stop-slop/references/phrases.md`, and `.claude/skills/stop-slop/references/structures.md`. Apply these rules when writing the post.

            4. Derive a short slug from the post title: lowercase, hyphens only, no special characters. Call this SLUG.

            5. Write a research summary to `research/${{ env.TODAY }}-SLUG.md`:
               ```markdown
               # Research: POST_TITLE

               **Date range:** FOUR_WEEKS_AGO to ${{ env.TODAY }}

               ## Summary

               KEY_INSIGHTS_HERE

               ## Sources

               - URL_1
               - URL_2
               ```

            6. Write the LinkedIn post to `posts/${{ env.TODAY }}-SLUG.md`:
               - First-person, professional but conversational voice
               - 150-300 words
               - End with 3-5 hashtags (include the provided hashtags, add 1-2 topic-relevant ones)
               - Apply all stop-slop rules strictly: no adverbs, no passive voice, no binary contrasts, no em-dashes, no throat-clearing openers, active voice throughout

            7. Create a branch, commit, and open a PR:
               ```bash
               BRANCH="feature/${{ env.TODAY }}-SLUG"
               git checkout -b "$BRANCH"
               git add posts/ research/
               git commit -m "feat: add post - POST_TITLE"
               git push origin "$BRANCH"
               gh pr create \
                 --title "[Post] POST_TITLE" \
                 --body "## POST_TITLE

               ### Research Summary

               RESEARCH_SUMMARY

               ### Sources

               SOURCES_LIST

               ---

               ### Reviewer Instructions

               1. Review the post in \`posts/${{ env.TODAY }}-SLUG.md\`
               2. To iterate locally:
                  \`\`\`
                  git checkout $BRANCH
                  claude
                  \`\`\`
               3. Push changes and merge when satisfied.
               4. Merging to \`main\` automatically publishes the post to LinkedIn."
               ```

            Replace SLUG, POST_TITLE, RESEARCH_SUMMARY, SOURCES_LIST, and FOUR_WEEKS_AGO with actual values derived from your research.
