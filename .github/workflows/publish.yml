name: Publish Post to LinkedIn

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new post file
        id: detect-post
        run: |
          POST_FILE=$(git log --diff-filter=A --name-only --pretty=format: \
            "${{ github.event.before }}..$GITHUB_SHA" \
            | grep -E "^posts/.+\.md$" | grep -v "^posts/INDEX.md$" | head -1 || true)
          echo "post_file=$POST_FILE" >> "$GITHUB_OUTPUT"
          if [ -z "$POST_FILE" ]; then
            echo "No new post file found in this commit. Skipping."
          else
            echo "Found post file: $POST_FILE"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect-post.outputs.post_file != ''
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
        if: steps.detect-post.outputs.post_file != ''

      - name: Publish to LinkedIn and capture URL
        id: publish
        if: steps.detect-post.outputs.post_file != ''
        run: npm run publish
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          POST_FILE_PATH: ${{ steps.detect-post.outputs.post_file }}

      - name: Fire blog routine
        if: steps.detect-post.outputs.post_file != ''
        env:
          BLOG_ROUTINE_FIRE_URL: ${{ secrets.BLOG_ROUTINE_FIRE_URL }}
          BLOG_ROUTINE_FIRE_TOKEN: ${{ secrets.BLOG_ROUTINE_FIRE_TOKEN }}
          SLUG: ${{ steps.publish.outputs.slug }}
          POST_URL: ${{ steps.publish.outputs.post_url }}
        run: |
          if [ -z "$BLOG_ROUTINE_FIRE_URL" ] || [ -z "$BLOG_ROUTINE_FIRE_TOKEN" ]; then
            echo "Blog routine not configured (BLOG_ROUTINE_FIRE_URL/TOKEN unset). Skipping."
            exit 0
          fi
          curl -sf --show-error -X POST "$BLOG_ROUTINE_FIRE_URL" \
            -H "Authorization: Bearer $BLOG_ROUTINE_FIRE_TOKEN" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Run the blog skill for the merged LinkedIn post. slug: '${SLUG}'. LinkedIn URL: ${POST_URL}\"}"
