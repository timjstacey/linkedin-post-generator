name: Publish Post to LinkedIn

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
  workflow_dispatch:
    inputs:
      post_file:
        description: 'Path to the post .md to publish (e.g. posts/2026-06-24-slug.md)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new post file
        id: detect-post
        env:
          POST_FILE_INPUT: ${{ inputs.post_file }}
          BEFORE: ${{ github.event.before }}
        run: |
          if [ -n "$POST_FILE_INPUT" ]; then
            POST_FILE="$POST_FILE_INPUT"
          else
            # Net before->after tree diff (rename-aware): the post that exists now
            # but did not at the previous main tip. A per-commit `git log` misreads
            # an in-branch rename as an add of the OLD path, which then fails to open.
            POST_FILE=$(git diff --diff-filter=A --name-only "$BEFORE" "$GITHUB_SHA" \
              | grep -E "^posts/.+\.md$" | grep -v "^posts/INDEX.md$" | head -1 || true)
          fi
          if [ -z "$POST_FILE" ]; then
            echo "No new post file found. Skipping."
          elif [ ! -f "$POST_FILE" ]; then
            echo "Detected post file does not exist on disk: $POST_FILE" >&2
            exit 1
          else
            echo "Found post file: $POST_FILE"
          fi
          echo "post_file=$POST_FILE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.detect-post.outputs.post_file != ''
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
        if: steps.detect-post.outputs.post_file != ''

      - name: Publish to LinkedIn and capture URL
        id: publish
        if: steps.detect-post.outputs.post_file != ''
        run: npm run publish
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          POST_FILE_PATH: ${{ steps.detect-post.outputs.post_file }}

      - name: Fire blog routine
        if: steps.detect-post.outputs.post_file != ''
        env:
          BLOG_ROUTINE_FIRE_URL: ${{ secrets.BLOG_ROUTINE_FIRE_URL }}
          BLOG_ROUTINE_FIRE_TOKEN: ${{ secrets.BLOG_ROUTINE_FIRE_TOKEN }}
          SLUG: ${{ steps.publish.outputs.slug }}
          POST_URL: ${{ steps.publish.outputs.post_url }}
        run: |
          if [ -z "$BLOG_ROUTINE_FIRE_URL" ] || [ -z "$BLOG_ROUTINE_FIRE_TOKEN" ]; then
            echo "Blog routine not configured (BLOG_ROUTINE_FIRE_URL/TOKEN unset). Skipping."
            exit 0
          fi
          curl -sf --show-error -X POST "$BLOG_ROUTINE_FIRE_URL" \
            -H "Authorization: Bearer $BLOG_ROUTINE_FIRE_TOKEN" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Run the blog skill for the merged LinkedIn post. slug: '${SLUG}'. LinkedIn URL: ${POST_URL}\"}"
